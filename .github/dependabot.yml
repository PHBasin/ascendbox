version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    # Keep the codeql-action sub-actions (init + analyze) in ONE PR so they always
    # bump to the same version together (mismatched versions fail CodeQL). Other
    # actions still get their own individual PRs.
    groups:
      codeql:
        patterns:
          - 'github/codeql-action*'
