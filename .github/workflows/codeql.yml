name: 'Security Analysis'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 1' # Mondays, 00:00 UTC

# Least privilege by default; the job elevates only security-events: write.
permissions:
  contents: read

# CodeQL is idempotent analysis → safe to cancel a superseded run on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: 🔍 Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      actions: read # read workflow run metadata
      contents: read # checkout
      security-events: write # upload results to the Security tab

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript # covers JS *and* TS explicitly
            build-mode: none
          - language: actions # scans the workflows themselves
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3
        with:
          category: '/language:${{ matrix.language }}'
