name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Least privilege by default
permissions:
  contents: read

# Never cancel semantic-release
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-gate:
    name: 🛡️ Quality Gate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup & install
        uses: ./.github/actions/setup
      - name: TypeScript Check
        run: npm run type-check
      - name: Code Linting
        run: npm run lint:ci

  build:
    name: ⚒️ Build Application
    needs: [quality-gate]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: write # to upload-pages-artifact
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup & install
        uses: ./.github/actions/setup
      - name: Build App
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  accessibility-gate:
    name: 🔦 Lighthouse
    needs: [quality-gate]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup & install
        uses: ./.github/actions/setup
      - name: Build App
        run: npm run build
      - name: Run Lighthouse CI (a11y + best-practices)
        run: npx --yes @lhci/cli@0.14.x autorun

  release:
    name: 📦 Semantic Release
    needs: [build]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    permissions:
      contents: write # push the release commit + tag
      issues: write # comments on issues
      pull-requests: write # and PRs
    outputs:
      released: ${{ steps.semantic.outputs.released }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # semantic-release needs history + tags
      - name: Setup & install
        uses: ./.github/actions/setup
      - name: Run Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # CLI does not emit an Actions output
        run: |
          before="$(git tag | wc -l)"
          npx semantic-release
          after="$(git tag | wc -l)"
          if [ "$after" -gt "$before" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: 🚀 Deploy to Production
    needs: [release]
    # Only deploy when a new version was actually published.
    if: needs.release.outputs.released == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
